<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymn</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hymn-container">

        <!-- Back Button -->
        <a href="hymns.html" class="back-btn">
            ← Back
        </a>

        <!-- Hymn Title -->
        <h1 id="hymnTitle">Loading...</h1>

        <!-- Hymn Content -->
        <div id="hymnLyrics" class="lyrics-box">

        </div>

    </div>

    <script src="script.js"></script>

    <script>
        // Get hymn ID from URL
        const params = new URLSearchParams(window.location.search);
        const hymnId = parseInt(params.get("id"));

        // Load hymns.json
        fetch("hymns.json")
            .then(response => response.json())
            .then(data => {

                const hymn = data.find(h => h.id === hymnId);

                if (hymn) {

                    document.getElementById("hymnTitle").innerText =
                        hymn.id + ". " + hymn.title;

                    const container = document.getElementById("hymnLyrics");

                    hymn.lyrics.forEach(stanza => {

                        const p = document.createElement("p");
                        p.classList.add("stanza");
                        p.innerText = stanza;

                        container.appendChild(p);

                    });

                } else {
                    document.getElementById("hymnTitle").innerText =
                        "Hymn not found";
                }

            })
            .catch(error => {
                document.getElementById("hymnTitle").innerText =
                    "Error loading hymn";
                console.log(error);
            });
    </script>

</body>
</html>
